<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weatherism</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="weather-section">
      <div class="weather-box">
        <div id="weather"></div>
      </div>
    </div>

    <div class="middle-section">
      <div class="middle-box">
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" style="display: block; width: 100%; height: 100%;"></a>
          <img
            src="/src/ketchup_bottles.jpg"
            alt="ketchup bottles"
            class="middle-image"
          />
        </a>
      </div>
    </div>

    <div class="search-section">
      <input
        type="text"
        class="search-box"
        id="searchBox"
        placeholder="Search Google"
      />
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
